<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FFA500;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF6B6B;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0B0B0F;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="100" height="100" rx="20" fill="url(#bgGradient)"/>
  
  <!-- Sparkle/Star shape -->
  <path d="M50 15 L55 40 L80 45 L55 50 L50 75 L45 50 L20 45 L45 40 Z" 
        fill="url(#goldGradient)" 
        filter="url(#glow)"
        opacity="0.9"/>
  
  <!-- Center sparkle -->
  <circle cx="50" cy="45" r="8" fill="url(#goldGradient)" opacity="0.6"/>
  <circle cx="50" cy="45" r="4" fill="#FFFFFF" opacity="0.8"/>
  
  <!-- Small sparkles around -->
  <circle cx="70" cy="25" r="2" fill="#FFD700" opacity="0.8"/>
  <circle cx="25" cy="70" r="2" fill="#FFA500" opacity="0.8"/>
  <circle cx="75" cy="70" r="1.5" fill="#FFD700" opacity="0.6"/>
  <circle cx="20" cy="30" r="1.5" fill="#FFA500" opacity="0.6"/>
</svg>
